version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: insightfuel-postgres
    environment:
      POSTGRES_USER: insightfuel
      POSTGRES_PASSWORD: insightfuel_secure_pass
      POSTGRES_DB: insightfuel_metadata
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U insightfuel -d insightfuel_metadata"]
      interval: 10s
      timeout: 5s
      retries: 5

  clickhouse:
    image: clickhouse/clickhouse-server:latest
    container_name: insightfuel-clickhouse
    environment:
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: insightfuel_clickhouse_pass
      CLICKHOUSE_DB: insightfuel_events
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - chdata:/var/lib/clickhouse
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8123/ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: insightfuel-redis
    command: redis-server --requirepass insightfuel_redis_pass
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "insightfuel_redis_pass", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v23.3.4
    container_name: insightfuel-redpanda
    command:
      - redpanda start
      - --smp 1
      - --overprovisioned
      - --kafka-addr internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr internal://redpanda:9092,external://localhost:19092
      - --pandaproxy-addr 0.0.0.0:8082
      - --advertise-pandaproxy-addr localhost:8082
    ports:
      - "8082:8082"
      - "9092:9092"
      - "19092:19092"
    volumes:
      - redpandadata:/var/lib/redpanda
    healthcheck:
      test: ["CMD", "rpk", "cluster", "info"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
  chdata:
  redisdata:
  redpandadata:
