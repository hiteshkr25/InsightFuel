replicaCount: 3

image:
  repository: insightfuel/query-api
  pullPolicy: IfNotPresent
  tag: "1.0.0"

service:
  type: ClusterIP
  port: 80

resources:
  limits:
    cpu: 1000m
    memory: 1024Mi
  requests:
    cpu: 250m
    memory: 512Mi

ingress:
  enabled: true
  className: "nginx"
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
  hosts:
    - host: api.insightfuel.io
      paths:
        - path: /api/v1
          pathType: Prefix
  tls:
    - secretName: insightfuel-tls-certs
      hosts:
        - api.insightfuel.io
