apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: insightfuel-query-api-hpa
  namespace: insightfuel
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: insightfuel-query-api
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
