apiVersion: v1
kind: LimitRange
metadata:
  name: insightfuel-core-limitrange
  namespace: insightfuel
spec:
  limits:
    - type: Container
      default:
        cpu: "1000m"
        memory: "1024Mi"
      defaultRequest:
        cpu: "200m"
        memory: "256Mi"
      max:
        cpu: "2000m"
        memory: "2048Mi"
      min:
        cpu: "50m"
        memory: "64Mi"
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: insightfuel-resource-quota
  namespace: insightfuel
spec:
  hard:
    pods: "20"
    requests.cpu: "4"
    requests.memory: "8Gi"
    limits.cpu: "10"
    limits.memory: "16Gi"
    persistentvolumeclaims: "10"
