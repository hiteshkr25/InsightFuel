apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: vault-backend
  namespace: insightfuel
spec:
  provider:
    vault:
      server: "http://vault.secrets.svc.cluster.local:8200"
      path: "secret"
      version: "v2"
      auth:
        tokenSecretRef:
          name: vault-token
          key: token
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: query-api-secrets-sync
  namespace: insightfuel
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: vault-backend
    kind: SecretStore
  target:
    name: query-api-secrets
    creationPolicy: Owner
  data:
    - secretKey: POSTGRES_PASSWORD
      remoteRef:
        key: production/postgres
        property: password
    - secretKey: CLICKHOUSE_PASSWORD
      remoteRef:
        key: production/clickhouse
        property: password
