apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: insightfuel-production
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: 'https://github.com/insightfuel/insightfuel.git'
    targetRevision: HEAD
    path: infra/helm/insightfuel
    helm:
      valueFiles:
        - values.yaml
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: insightfuel
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
