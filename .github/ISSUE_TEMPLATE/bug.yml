name: Bug Report
description: Create a report to help us improve the platform.
title: "[BUG]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out a bug report!
  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: Clear and concise description of the bug.
      placeholder: Describe what the bug is...
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Go to '...'
        2. Click on '....'
        3. See error '...'
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: A clear and concise description of what you expected to happen.
      placeholder: Describe expected outcomes...
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment Info
      description: OS version, browser version, SDK version, etc.
      placeholder: e.g., macOS 14.2, Chrome 121, SDK v1.0.0
    validations:
      required: false
